<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="images/mv-logo.svg">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Melis Vlahović | Opera Singer & Mezzo-Soprano</title>

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=block" rel="stylesheet">

<style>
:root{
  --text:#eef2f6;
  --muted:#88a4af;
  --surface:rgba(15,25,30,.6);
  --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Josefin Sans",sans-serif;
  color:var(--text);
  background:#0a1a22;
}

/* NAV */

header.nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
}

.nav-inner{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 20px;
}

/* LOGO */
.nav-logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
}

.nav-logo img{
  height:40px;
}

/* NAV LINKS (desktop only) */
.top-nav ul{
  display:flex;
  gap:28px;
  list-style:none;
  padding:0;
  margin:0;
}

.top-nav a{
  text-decoration:none;
  color:var(--text);
  text-transform:uppercase;
  font-size:.8rem;
  letter-spacing:.1em;
}

/* RIGHT SIDE */
.nav-right-row{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:10px;
  align-items:center;
}

/* LANGUAGE */
.lang-switcher-top{
  font-size:.7rem;
  letter-spacing:.12em;
}

/* HAMBURGER */
.menu-toggle{
  display:none;
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.menu-toggle span{
  width:18px;
  height:2px;
  background:#fff;
  display:block;
  margin:3px 0;
}

/* HERO */
.hero{
  min-height:100vh;
  background:url("images/bg.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 80px;
}

.hero-inner{
  max-width:600px;
}

.hero h1{
  font-size:3rem;
  letter-spacing:.18em;
  margin:0;
}

.hero p{
  margin:20px 0;
  color:var(--muted);
}

.btn{
  display:block;
  margin:10px auto;
  padding:14px 20px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.3);
  text-decoration:none;
  color:#fff;
}

/* MOBILE */

@media(max-width:768px){

  /* REMOVE BLUE BAR */
  header.nav{
    background:transparent;
    border:0;
    box-shadow:none;
  }

  .nav-inner{
    padding:12px 16px;
    justify-content:flex-start;
  }

  /* LOGO */
  .nav-logo{
    left:12px;
  }

  .nav-logo img{
    height:34px;
  }

  /* HIDE DESKTOP NAV */
  .top-nav{
    display:none;
  }

  /* RIGHT SIDE STACK */
  .nav-right-row{
    position:absolute;
    right:12px;
    top:8px;
    transform:none;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
  }

  .lang-switcher-top{
    font-size:.72rem;
    opacity:.9;
  }

  .menu-toggle{
    display:flex;
  }

  /* HERO FIX */
  .hero{
    padding-top:80px;
    background-position:50% 35%;
  }

  .hero h1{
    font-size:2.2rem;
  }
}
</style>
</head>

<body>

<header class="nav">
  <div class="nav-inner">

    <div class="nav-logo">
      <img src="images/mv-logo.svg" alt="MV">
    </div>

    <nav class="top-nav">
      <ul>
        <li><a href="#">About</a></li>
        <li><a href="#">Biography</a></li>
        <li><a href="#">Calendar</a></li>
        <li><a href="#">Repertoire</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Recordings</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="nav-right-row">
      <div class="lang-switcher-top">EN / DE</div>

      <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>MELIS<br>VLAHOVIĆ</h1>
    <p>MEZZO-SOPRANO</p>

    <a href="#" class="btn">See Calendar</a>
    <a href="#" class="btn">Watch / Listen</a>
  </div>
</section>

</body>
</html>
